<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Teacher — Exam Paper Corrector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8c547;
    --accent2: #c4a03c;
    --text: #f0ece0;
    --text-dim: #888;
    --text-muted: #555;
    --user-bubble: #1a2a1a;
    --ai-bubble: #1a1a2a;
    --error: #e05a5a;
    --success: #5ae0a0;
    --radius: 12px;
    --font-display: 'Playfair Display', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #000;
    font-family: var(--font-display);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-subtitle {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .model-badge {
    font-size: 0.65rem;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .model-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* API Key bar */
  .api-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .api-bar label {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .api-input-wrap {
    flex: 1;
    position: relative;
  }

  .api-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 7px 36px 7px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); }

  .api-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    padding: 0;
    line-height: 1;
  }

  .system-prompt-toggle {
    font-size: 0.65rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .system-prompt-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* System prompt editor */
  .system-prompt-panel {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: none;
    flex-shrink: 0;
  }

  .system-prompt-panel.open { display: block; }

  .system-prompt-panel label {
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  .system-prompt-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 12px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    min-height: 80px;
    transition: border-color 0.2s;
  }

  .system-prompt-textarea:focus { border-color: var(--accent); }

  /* Chat area */
  .chat-area {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 28px 32px;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0.5;
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.6s ease;
  }

  .empty-icon {
    font-size: 48px;
    filter: grayscale(0.5);
  }

  .empty-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--text);
  }

  .empty-desc {
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 380px;
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 14px;
    animation: slideUp 0.3s ease;
    max-width: 820px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 0.5; }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai { align-self: flex-start; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    font-family: var(--font-display);
  }

  .message.user .avatar {
    background: var(--accent2);
    color: #000;
  }

  .message.ai .avatar {
    background: #2a2a4a;
    color: var(--accent);
    font-size: 18px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    line-height: 1.75;
    max-width: 680px;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a3a2a;
    border-bottom-right-radius: 3px;
    color: var(--text);
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid #2a2a3a;
    border-bottom-left-radius: 3px;
    color: var(--text);
  }

  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }

  .bubble strong {
    color: var(--accent);
    font-weight: 500;
  }

  .bubble em { color: var(--success); font-style: italic; }

  .bubble code {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.78rem;
    color: var(--accent);
    font-family: var(--font-mono);
  }

  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 0.75rem;
    line-height: 1.6;
  }

  .bubble pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--success);
  }

  /* Timestamp */
  .msg-meta {
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 5px;
    padding: 0 4px;
  }

  .message.user .msg-meta { text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--ai-bubble);
    border: 1px solid #2a2a3a;
    border-radius: var(--radius);
    border-bottom-left-radius: 3px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232, 197, 71, 0.08);
  }

  .message-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 14px 16px;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 52px;
    max-height: 200px;
  }

  .message-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 52px;
    height: 52px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.04); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: #000; }

  .input-hint {
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* Error banner */
  .error-banner {
    background: rgba(224, 90, 90, 0.1);
    border: 1px solid rgba(224, 90, 90, 0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.75rem;
    color: var(--error);
    display: none;
    margin: 0 32px 14px;
    animation: slideUp 0.3s ease;
  }

  .error-banner.show { display: block; }

  /* Clear button */
  .clear-btn {
    font-size: 0.65rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--error); color: var(--error); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Scrollbar fix for textarea */
  .message-input::-webkit-scrollbar { width: 3px; }
  .message-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header, .api-bar, .system-prompt-panel, .input-area, .chat-area {
      padding-left: 16px;
      padding-right: 16px;
    }
    .error-banner { margin: 0 16px 14px; }
    .bubble { font-size: 0.78rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">✦</div>
    <div>
      <div class="header-title">AI Teacher</div>
      <div class="header-subtitle">Exam Paper Corrector</div>
    </div>
  </div>
  <div class="header-right">
    <div class="model-badge">gemini-2.5-flash</div>
    <button class="clear-btn" id="clearBtn">Clear chat</button>
  </div>
</header>


<input type="hidden" id="apiKey" value="AIzaSyAvc0e8qVy4ti0q0lcKKdvKfSpbCWv4ZlU"/>
<div class="api-bar">
  <button class="system-prompt-toggle" id="sysToggle">System Prompt ▾</button>
</div>

<div class="system-prompt-panel" id="sysPanel">
  <label>System Instruction</label>
  <textarea class="system-prompt-textarea" id="systemPrompt">You are a teacher who corrects exam papers. Give answers from the internet with accurate, well-structured explanations. Be encouraging yet precise in your corrections.</textarea>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📝</div>
    <div class="empty-title">Ready to Grade</div>
    <div class="empty-desc">Ask any question — exam answers, corrections, explanations — and your AI teacher will respond.</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea class="message-input" id="messageInput" placeholder="Ask a question or submit an answer for correction…" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiKeyInput = document.getElementById('apiKey');
  const sysToggle = document.getElementById('sysToggle');
  const sysPanel = document.getElementById('sysPanel');
  const systemPrompt = document.getElementById('systemPrompt');
  const clearBtn = document.getElementById('clearBtn');
  const errorBanner = document.getElementById('errorBanner');

  let chatHistory = [];
  let isLoading = false;

  // Pre-fill API key
  apiKeyInput.value = 'AIzaSyAvc0e8qVy4ti0q0lcKKdvKfSpbCWv4ZlU';

  // Auto-resize textarea
  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
  });

  // Toggle system prompt panel
  sysToggle.addEventListener('click', () => {
    sysPanel.classList.toggle('open');
    sysToggle.textContent = sysPanel.classList.contains('open') ? 'System Prompt ▴' : 'System Prompt ▾';
  });

  // Clear chat
  clearBtn.addEventListener('click', () => {
    chatHistory = [];
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
    hideError();
  });

  // Send on Enter
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('show');
  }

  function hideError() {
    errorBanner.classList.remove('show');
  }

  function getTimestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatText(text) {
    // Basic markdown-ish formatting
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Code blocks
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`
    );
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Newlines to paragraphs
    const lines = text.split('\n');
    let html = '';
    let inPre = false;
    lines.forEach(line => {
      if (line.includes('<pre>')) inPre = true;
      if (line.includes('</pre>')) inPre = false;
      if (!inPre && line.trim() === '') return;
      if (inPre) { html += line + '\n'; }
      else { html += `<p>${line}</p>`; }
    });
    return html || `<p>${text}</p>`;
  }

  function appendMessage(role, text) {
    emptyState.style.display = 'none';

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const content = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = getTimestamp();

    content.appendChild(bubble);
    content.appendChild(meta);

    wrapper.appendChild(avatar);
    wrapper.appendChild(content);

    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;

    return bubble;
  }

  function showTyping() {
    emptyState.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = 'message ai';
    wrapper.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'typing-dot';
      indicator.appendChild(dot);
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(indicator);
    chatArea.appendChild(wrapper);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || isLoading) return;

    hideError();
    isLoading = true;
    sendBtn.disabled = true;
    messageInput.value = '';
    messageInput.style.height = 'auto';

    appendMessage('user', text);
    chatHistory.push({ role: 'user', parts: [{ text }] });

    showTyping();

    try {
      const apiKey = apiKeyInput.value;
      const sysInstruction = systemPrompt.value.trim();

      const body = {
        system_instruction: sysInstruction ? { parts: [{ text: sysInstruction }] } : undefined,
        contents: chatHistory,
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 2048,
        }
      };

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }
      );

      const data = await res.json();

      if (!res.ok) {
        const errMsg = data?.error?.message || `API error ${res.status}`;
        throw new Error(errMsg);
      }

      const aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!aiText) throw new Error('Empty response from model.');

      removeTyping();
      appendMessage('ai', aiText);
      chatHistory.push({ role: 'model', parts: [{ text: aiText }] });

    } catch (err) {
      removeTyping();
      showError('Error: ' + err.message);
      // Remove last user message from history if failed
      chatHistory.pop();
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }
</script>
</body>
</html>
